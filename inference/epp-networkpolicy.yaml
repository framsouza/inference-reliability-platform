apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-8b-epp
  namespace: llama
  labels:
    app.kubernetes.io/name: llama-8b-epp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: llama-8b-epp
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - {protocol: TCP, port: 9002}
        - {protocol: TCP, port: 9003}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - {protocol: TCP, port: 9090}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16
      ports:
        - {protocol: TCP, port: 443}
        - {protocol: TCP, port: 6443}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: llama-8b
              app.kubernetes.io/instance: llama
      ports:
        - {protocol: TCP, port: 8000}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-8b-allow-epp-scrape
  namespace: llama
  labels:
    app.kubernetes.io/name: llama-8b-epp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: llama-8b
      app.kubernetes.io/instance: llama
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: llama-8b-epp
      ports:
        - {protocol: TCP, port: 8000}
