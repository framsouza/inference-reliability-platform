apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.21.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 168h
            max_query_length: 168h
            ingestion_rate_mb: 8
            ingestion_burst_size_mb: 16
          compactor:
            working_directory: /var/loki/compactor
            retention_enabled: true
            retention_delete_delay: 2h
            delete_request_store: filesystem
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        gateway:
          enabled: true
          replicas: 1
        test:
          enabled: false
        lokiCanary:
          enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
