apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.15.2
    helm:
      releaseName: keda
      values: |
        crds:
          install: true
        prometheus:
          metricServer:
            enabled: true
          operator:
            enabled: true
        resources:
          operator:
            requests: {cpu: 50m, memory: 128Mi}
          metricServer:
            requests: {cpu: 50m, memory: 128Mi}
        podDisruptionBudget:
          operator:
            enabled: false
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
