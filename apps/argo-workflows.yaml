apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-workflows
    targetRevision: 0.45.0
    helm:
      releaseName: argo-workflows
      values: |
        crds:
          install: true
          keep: false
        controller:
          workflowNamespaces:
            - argo
          resources:
            requests: {cpu: 50m, memory: 128Mi}
        server:
          authModes:
            - server
          extraArgs:
            - --auth-mode=server
          resources:
            requests: {cpu: 50m, memory: 128Mi}
          serviceType: ClusterIP
        workflow:
          serviceAccount:
            create: true
            name: argo-workflow
          rbac:
            create: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
