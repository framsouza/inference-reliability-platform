apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
spec:
  project: default
  source:
    # Experimental channel: includes standard CRDs (Gateway, HTTPRoute,
    # GatewayClass, GRPCRoute, ReferenceGrant) *plus* the alpha CRDs kgateway
    # needs to reach Ready (TLSRoute, TCPRoute, BackendTLSPolicy,
    # BackendLBPolicy). Without these, kgateway's initial sync blocks
    # indefinitely and never provisions the Gateway data plane.
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.2.1
    path: config/crd/experimental
    directory:
      recurse: false
      include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
