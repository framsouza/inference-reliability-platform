apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pushgateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-pushgateway
    targetRevision: 2.15.0
    helm:
      releaseName: pushgateway
      values: |
        replicaCount: 1
        service:
          type: ClusterIP
          port: 9091
        serviceMonitor:
          enabled: true
          additionalLabels:
            release: kps
        persistentVolume:
          enabled: false
        resources:
          requests: {cpu: 20m, memory: 32Mi}
          limits: {memory: 128Mi}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
