apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: root-redirect
  namespace: gateway
spec:
  parentRefs:
    - name: public
      namespace: gateway
      sectionName: http
  rules:
    - matches:
        - path:
            type: Exact
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /argocd/
            statusCode: 302
