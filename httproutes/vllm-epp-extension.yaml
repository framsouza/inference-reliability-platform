apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: vllm-epp
  namespace: llama
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  extProc:
    - backendRefs:
        - name: llama-8b-epp
          port: 9002
      messageTimeout: 5s
      failOpen: true
      processingMode:
        request:
          body: Buffered
        response:
          body: Streamed
