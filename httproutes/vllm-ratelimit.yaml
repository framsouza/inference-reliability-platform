apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: vllm-ratelimit
  namespace: llama
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  rateLimit:
    local:
      tokenBucket:
        maxTokens: 60
        tokensPerFill: 60
        fillInterval: 60s
