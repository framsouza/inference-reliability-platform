apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: vllm-ratelimit
  namespace: llama
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vllm
  rateLimit:
    type: Local
    local:
      rules:
        - limit:
            requests: 60
            unit: Minute
