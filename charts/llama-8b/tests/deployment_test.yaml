suite: deployment
templates:
  - deployment.yaml
release:
  name: llama
  namespace: llama
tests:
  # ────────── image + reliability foundations ──────────
  - it: uses the pinned image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "vllm/vllm-openai:v0.7.3"

  - it: pins priorityClassName and runtimeClassName
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: gpu-inference
      - equal:
          path: spec.template.spec.runtimeClassName
          value: nvidia

  - it: sets terminationGracePeriodSeconds and preStop drain
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 120
      - matchRegex:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command[2]
          pattern: "sleep 15.*kill -TERM 1"

  - it: reserves cpu + memory + gpu (protects from best-effort eviction)
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "4"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "16Gi"
      - equal:
          path: spec.template.spec.containers[0].resources.requests["nvidia.com/gpu"]
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "32Gi"

  # ────────── probes ──────────
  - it: uses startupProbe with generous cold-start budget
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 180
      - equal:
          path: spec.template.spec.containers[0].startupProbe.periodSeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 3
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 15

  # ────────── HF cache ──────────
  - it: mounts hf-cache PVC and sets HF_HOME + HF_HUB_ENABLE_HF_TRANSFER
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: hf-cache
            mountPath: /cache/huggingface
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HF_HOME
            value: /cache/huggingface
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HF_HUB_ENABLE_HF_TRANSFER
            value: "1"

  - it: skips PVC mount when persistence disabled
    set:
      persistence.hfCache.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: hf-cache
            mountPath: /cache/huggingface

  # ────────── /dev/shm ──────────
  - it: mounts /dev/shm as in-memory emptyDir with a sizeLimit
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shm
            mountPath: /dev/shm
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi

  # ────────── HF token + API key ──────────
  - it: mounts HF token from Secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-token
                key: token

  - it: mounts vLLM API key from Secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VLLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: vllm-api-key
                key: token

  - it: does not mount API key when disabled
    set:
      apiKey.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VLLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: vllm-api-key
                key: token

  # ────────── OTLP tracing ──────────
  - it: propagates OTLP env when tracesEndpoint set
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_SERVICE_NAME
            value: vllm
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OTEL_EXPORTER_OTLP_PROTOCOL
            value: http/protobuf

  # ────────── prefix caching flag ──────────
  - it: does NOT include prefix caching flag by default (installSdk branch)
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[4]
          pattern: "--enable-prefix-caching"

  - it: adds prefix caching flag in bash-command mode when enabled
    set:
      enablePrefixCaching: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[4]
          pattern: "--enable-prefix-caching"

  - it: adds prefix caching flag in args-list mode when enabled + no otlp
    set:
      enablePrefixCaching: true
      otlp.tracesEndpoint: ""
      otlp.installSdk: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-prefix-caching

  # ────────── strategy — the "single-GPU forces Recreate" invariant ──────────
  - it: uses Recreate strategy (single-GPU cluster invariant)
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate
