apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llama.fullname" . }}
  labels: {{- include "llama.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "llama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "llama.selectorLabels" . | nindent 8 }}
    spec:
      runtimeClassName: nvidia
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.priorityClass.enabled }}
      priorityClassName: {{ .Values.priorityClass.name }}
      {{- end }}
      containers:
        - name: vllm
          image: {{ .Values.image }}
          {{- if and .Values.otlp.tracesEndpoint .Values.otlp.installSdk }}
          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              pip install --no-cache-dir --quiet \
                opentelemetry-api \
                opentelemetry-sdk \
                opentelemetry-exporter-otlp \
                opentelemetry-semantic-conventions \
                hf_transfer
              args=(
                --model "{{ .Values.model }}"
                {{- if .Values.enablePrefixCaching }}
                --enable-prefix-caching
                {{- end }}
                {{- if .Values.apiKey.enabled }}
                --api-key "$VLLM_API_KEY"
                {{- end }}
                --otlp-traces-endpoint "{{ .Values.otlp.tracesEndpoint }}"
              )
              exec python3 -m vllm.entrypoints.openai.api_server "${args[@]}"
          {{- else }}
          args:
            - --model
            - "{{ .Values.model }}"
            {{- if .Values.enablePrefixCaching }}
            - --enable-prefix-caching
            {{- end }}
            {{- if .Values.apiKey.enabled }}
            - --api-key
            - "$(VLLM_API_KEY)"
            {{- end }}
            {{- if .Values.otlp.tracesEndpoint }}
            - --otlp-traces-endpoint
            - "{{ .Values.otlp.tracesEndpoint }}"
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
              nvidia.com/gpu: {{ .Values.gpu }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              nvidia.com/gpu: {{ .Values.gpu }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep {{ .Values.preStopSleepSeconds }} && kill -TERM 1"
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            failureThreshold: {{ .Values.probes.startupFailureThreshold }}
          readinessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 15
            failureThreshold: 4
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llama.hfSecretName" . }}
                  key: token
            {{- if .Values.apiKey.enabled }}
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKey.existingSecret }}
                  key: {{ .Values.apiKey.secretKey }}
            {{- end }}
            {{- if .Values.persistence.hfCache.enabled }}
            - name: HF_HOME
              value: /cache/huggingface
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            {{- end }}
            {{- if .Values.otlp.tracesEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otlp.serviceName }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otlp.tracesEndpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            {{- end }}
          volumeMounts:
            {{- if .Values.persistence.hfCache.enabled }}
            - name: hf-cache
              mountPath: /cache/huggingface
            {{- end }}
            - name: shm
              mountPath: /dev/shm
      volumes:
        {{- if .Values.persistence.hfCache.enabled }}
        - name: hf-cache
          persistentVolumeClaim:
            claimName: {{ include "llama.fullname" . }}-hf-cache
        {{- end }}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
