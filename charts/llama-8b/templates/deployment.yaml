apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llama.fullname" . }}
  labels: {{- include "llama.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels: {{- include "llama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "llama.selectorLabels" . | nindent 8 }}
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: {{ .Values.image }}
          {{- if and .Values.otlp.tracesEndpoint .Values.otlp.installSdk }}
          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              pip install --no-cache-dir --quiet \
                opentelemetry-api \
                opentelemetry-sdk \
                opentelemetry-exporter-otlp \
                opentelemetry-semantic-conventions
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model "{{ .Values.model }}" \
                --otlp-traces-endpoint "{{ .Values.otlp.tracesEndpoint }}"
          {{- else }}
          args:
            - --model
            - "{{ .Values.model }}"
            {{- if .Values.otlp.tracesEndpoint }}
            - --otlp-traces-endpoint
            - "{{ .Values.otlp.tracesEndpoint }}"
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.gpu }}
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 180
            periodSeconds: 15
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "llama.hfSecretName" . }}
                  key: token
            {{- if .Values.otlp.tracesEndpoint }}
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otlp.serviceName }}"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otlp.tracesEndpoint }}"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            {{- end }}
