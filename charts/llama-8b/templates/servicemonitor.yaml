apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "llama.fullname" . }}
  labels: {{- include "llama.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels: {{- include "llama.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
