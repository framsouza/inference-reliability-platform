apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: model-quality-eval
  namespace: argo
spec:
  entrypoint: eval
  serviceAccountName: argo-workflow
  ttlStrategy:
    secondsAfterCompletion: 86400
  podGC:
    strategy: OnWorkflowSuccess
  arguments:
    parameters:
      - name: model
        value: meta-llama/Meta-Llama-3-8B-Instruct
      - name: vllm-url
        value: http://llama-llama-8b.llama.svc.cluster.local:8000
      - name: pushgateway-url
        value: http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091
      - name: max-tokens
        value: "200"
      - name: temperature
        value: "0.1"
      - name: min-pass-rate
        value: "0.4"
      - name: image
        value: python:3.11-slim
  templates:
    - name: eval
      inputs:
        parameters:
          - {name: model}
          - {name: vllm-url}
          - {name: pushgateway-url}
          - {name: max-tokens}
          - {name: temperature}
          - {name: min-pass-rate}
          - {name: image}
      container:
        image: "{{inputs.parameters.image}}"
        command: [/bin/bash, -c]
        env:
          - {name: MODEL,               value: "{{inputs.parameters.model}}"}
          - {name: VLLM_URL,            value: "{{inputs.parameters.vllm-url}}"}
          - {name: PUSHGATEWAY_URL,     value: "{{inputs.parameters.pushgateway-url}}"}
          - {name: MAX_TOKENS,          value: "{{inputs.parameters.max-tokens}}"}
          - {name: TEMPERATURE,         value: "{{inputs.parameters.temperature}}"}
          - {name: MIN_OVERALL_PASS_RATE, value: "{{inputs.parameters.min-pass-rate}}"}
          - {name: PROMPTS_FILE,        value: /prompts/prompts.jsonl}
          - name: VLLM_API_KEY
            valueFrom:
              secretKeyRef:
                name: vllm-api-key
                key: token
                optional: true
        args:
          - |
            set -euo pipefail
            pip install --quiet --root-user-action=ignore requests prometheus_client
            exec python3 /script/evaluator.py
        volumeMounts:
          - {name: prompts, mountPath: /prompts}
          - {name: script,  mountPath: /script}
        resources:
          requests: {cpu: "200m", memory: "256Mi"}
          limits:   {cpu: "1",    memory: "512Mi"}
      volumes:
        - name: prompts
          configMap:
            name: model-eval-prompts
        - name: script
          configMap:
            name: model-eval-script
