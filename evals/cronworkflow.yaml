apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: model-quality-eval
  namespace: argo
spec:
  schedule: "17 */6 * * *"
  timezone: UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  workflowSpec:
    workflowTemplateRef:
      name: model-quality-eval
