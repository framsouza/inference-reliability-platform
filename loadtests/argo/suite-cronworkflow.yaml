apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: vllm-bench-suite
  namespace: argo
spec:
  schedule: "23 2 * * *"
  timezone: UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 900
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  workflowSpec:
    workflowTemplateRef:
      name: vllm-bench-suite
