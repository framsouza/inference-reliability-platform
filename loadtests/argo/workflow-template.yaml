apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: vllm-bench
  namespace: argo
spec:
  entrypoint: bench
  serviceAccountName: argo-workflow
  ttlStrategy:
    secondsAfterCompletion: 3600
  podGC:
    strategy: OnWorkflowSuccess
  arguments:
    parameters:
      - {name: scenario,        value: baseline}
      - {name: model,           value: meta-llama/Meta-Llama-3-8B-Instruct}
      - {name: base-url,        value: http://llama-llama-8b.llama.svc.cluster.local:8000}
      - {name: dataset,         value: random}
      - {name: num-prompts,     value: "200"}
      - {name: request-rate,    value: "5"}
      - {name: input-len,       value: "512"}
      - {name: output-len,      value: "128"}
      - {name: seed,            value: "42"}
      - {name: image,           value: vllm/vllm-openai:v0.9.2}
      - {name: pushgateway-url, value: http://pushgateway-prometheus-pushgateway.monitoring.svc.cluster.local:9091}
  templates:
    - name: bench
      inputs:
        parameters:
          - {name: scenario}
          - {name: model}
          - {name: base-url}
          - {name: dataset}
          - {name: num-prompts}
          - {name: request-rate}
          - {name: input-len}
          - {name: output-len}
          - {name: seed}
          - {name: image}
          - {name: pushgateway-url}
      container:
        image: "{{inputs.parameters.image}}"
        command: [/bin/bash, -c]
        args:
          - |
            set -euo pipefail
            echo ">>> scenario={{inputs.parameters.scenario}} rate={{inputs.parameters.request-rate}} prompts={{inputs.parameters.num-prompts}} in={{inputs.parameters.input-len}} out={{inputs.parameters.output-len}} dataset={{inputs.parameters.dataset}}"
            apt-get update -qq
            apt-get install -qq -y --no-install-recommends git jq >/dev/null
            git clone --depth 1 --branch v0.9.2 https://github.com/vllm-project/vllm.git /tmp/vllm
            pip install --quiet --root-user-action=ignore pandas Pillow datasets
            cd /tmp/vllm/benchmarks

            python3 benchmark_serving.py \
              --backend openai-chat \
              --model "{{inputs.parameters.model}}" \
              --base-url "{{inputs.parameters.base-url}}" \
              --endpoint /v1/chat/completions \
              --dataset-name {{inputs.parameters.dataset}} \
              --num-prompts {{inputs.parameters.num-prompts}} \
              --request-rate {{inputs.parameters.request-rate}} \
              --random-input-len {{inputs.parameters.input-len}} \
              --random-output-len {{inputs.parameters.output-len}} \
              --seed {{inputs.parameters.seed}} \
              --percentile-metrics ttft,tpot,itl,e2el \
              --metric-percentiles 50,90,95,99 \
              --save-result --result-dir /tmp --result-filename result.json

            echo ">>> pushing summary to Pushgateway"
            SCENARIO="{{inputs.parameters.scenario}}"
            MODEL="{{inputs.parameters.model}}"
            # jq -r returns "null" for missing keys — filter those out inline
            get() { jq -r ".$1 // empty" /tmp/result.json 2>/dev/null || echo ""; }

            NOW=$(date +%s)
            TTFT_P95_MS=$(get p95_ttft_ms)
            TTFT_P99_MS=$(get p99_ttft_ms)
            TTFT_MEAN_MS=$(get mean_ttft_ms)
            E2E_P95_MS=$(get p95_e2el_ms)
            E2E_P99_MS=$(get p99_e2el_ms)
            E2E_MEAN_MS=$(get mean_e2el_ms)
            OUT_TP=$(get output_throughput)
            REQ_TP=$(get request_throughput)
            COMPLETED=$(get completed)
            NUM_PROMPTS=$(get num_prompts)
            DURATION=$(get duration)
            ERRORS=$(jq -r '((.num_prompts // 0) - (.completed // 0))' /tmp/result.json)
            ERR_RATE=$(jq -r 'if (.num_prompts // 0) > 0 then (((.num_prompts // 0) - (.completed // 0)) / (.num_prompts // 1)) else 0 end' /tmp/result.json)

            to_s() { awk -v v="$1" 'BEGIN{if (v!="") printf "%.6f", v/1000}'; }

            cat <<METRICS > /tmp/push.txt
            loadtest_ttft_p95_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$TTFT_P95_MS")
            loadtest_ttft_p99_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$TTFT_P99_MS")
            loadtest_ttft_mean_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$TTFT_MEAN_MS")
            loadtest_e2e_p95_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$E2E_P95_MS")
            loadtest_e2e_p99_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$E2E_P99_MS")
            loadtest_e2e_mean_seconds{scenario="$SCENARIO",model="$MODEL"} $(to_s "$E2E_MEAN_MS")
            loadtest_output_throughput_tokens_per_sec{scenario="$SCENARIO",model="$MODEL"} ${OUT_TP:-0}
            loadtest_request_throughput_per_sec{scenario="$SCENARIO",model="$MODEL"} ${REQ_TP:-0}
            loadtest_completed{scenario="$SCENARIO",model="$MODEL"} ${COMPLETED:-0}
            loadtest_prompts_total{scenario="$SCENARIO",model="$MODEL"} ${NUM_PROMPTS:-0}
            loadtest_errors{scenario="$SCENARIO",model="$MODEL"} ${ERRORS:-0}
            loadtest_error_rate{scenario="$SCENARIO",model="$MODEL"} ${ERR_RATE:-0}
            loadtest_duration_seconds{scenario="$SCENARIO",model="$MODEL"} ${DURATION:-0}
            loadtest_last_run_timestamp{scenario="$SCENARIO",model="$MODEL"} $NOW
            METRICS

            # Strip leading whitespace that the heredoc preserves
            sed -i 's/^ *//' /tmp/push.txt
            cat /tmp/push.txt

            curl -sSf --data-binary @/tmp/push.txt \
              "{{inputs.parameters.pushgateway-url}}/metrics/job/vllm-bench/scenario/$SCENARIO"
            echo ">>> pushed to Pushgateway"
        env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef: {name: hf-token, key: token, optional: false}
          - name: HF_HUB_ENABLE_HF_TRANSFER
            value: "0"
        resources:
          requests: {cpu: "500m", memory: "1Gi"}
          limits:   {cpu: "2",    memory: "4Gi"}
