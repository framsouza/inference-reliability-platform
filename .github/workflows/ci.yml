name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install yamllint
        run: pipx install yamllint
      - name: run
        run: yamllint -c .yamllint.yaml .

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./bootstrap
          severity: error

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: {version: v3.15.3}
      - run: helm lint charts/llama-8b

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: {version: v3.15.3}
      - name: install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
      - name: validate rendered helm chart
        run: |
          helm template llama charts/llama-8b > /tmp/chart.yaml
          kubeconform -strict -summary -ignore-missing-schemas \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/chart.yaml
      - name: validate raw manifests
        run: |
          find alerts dashboards gateway httproutes policies loadtests secrets evals -name '*.yaml' -print0 2>/dev/null \
            | xargs -0 -r kubeconform -strict -summary -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  kyverno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: {version: v3.15.3}
      - name: install kyverno-cli
        run: |
          curl -sSL https://github.com/kyverno/kyverno/releases/download/v1.13.0/kyverno-cli_v1.13.0_linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin kyverno
          kyverno version
      - name: dry-run policies against rendered chart
        # Exclude verify-vllm-image: it hits Sigstore/Rekor from the runner which
        # is (a) flaky and (b) not what CI is trying to validate — the image sig
        # check runs on the cluster's Kyverno at admission time.
        run: |
          helm template llama charts/llama-8b > /tmp/chart.yaml
          mkdir -p /tmp/policies
          cp policies/*.yaml /tmp/policies/
          rm -f /tmp/policies/verify-vllm-image.yaml
          kyverno apply /tmp/policies --resource /tmp/chart.yaml

  helm-unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: {version: v3.15.3}
      - name: install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 0.7.2
      - name: run chart unit tests
        run: helm unittest charts/llama-8b

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}
      - name: install
        run: pip install -r evals/tests/requirements.txt
      - name: pytest
        run: pytest evals/tests/ -v

  mermaid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '20'}
      - name: render mermaid sources
        # CI runners don't have full sandboxing setup for Chrome; disable via
        # puppeteer config or mermaid gives cryptic "Failed to launch" errors.
        run: |
          echo '{"args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer.json
          for f in images/*.mmd; do
            echo "--- rendering $f ---"
            npx --yes -p @mermaid-js/mermaid-cli@11.4.0 \
              mmdc -i "$f" -o "/tmp/$(basename "$f" .mmd).svg" -p /tmp/puppeteer.json -b white
          done

  argocd-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: validate all Application manifests parse
        run: |
          find apps -name '*.yaml' -exec sh -c '
            for f; do
              python3 -c "import yaml,sys; d=yaml.safe_load(open(\"$f\")); assert d[\"kind\"]==\"Application\", \"$f not an Application\"; print(f\"ok: {d[\"metadata\"][\"name\"]}\")"
            done' sh {} +
