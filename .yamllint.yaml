extends: default

ignore: |
  charts/llama-8b/templates/
  images/*.svg
  .github/

rules:
  line-length:
    max: 160
    level: warning
  document-start: disable
  truthy:
    allowed-values: ['true', 'false']
    check-keys: false
  comments-indentation: disable
  indentation:
    spaces: consistent
    indent-sequences: consistent
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1
