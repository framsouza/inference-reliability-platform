apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: repo-nvidia-brev-vllm
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-dev
    kind: ClusterSecretStore
  target:
    name: repo-nvidia-brev-vllm
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: "git"
        url: "{{ .url }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: url
      remoteRef:
        key: github
        property: url
    - secretKey: username
      remoteRef:
        key: github
        property: username
    - secretKey: password
      remoteRef:
        key: github
        property: password
