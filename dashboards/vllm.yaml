apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-vllm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  vllm.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "stat",
          "title": "Running",
          "gridPos": {"h": 4, "w": 3, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "sum(vllm:num_requests_running{model_name=~\"$model\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 8}, {"color": "red", "value": 16}]}, "unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Waiting",
          "gridPos": {"h": 4, "w": 3, "x": 3, "y": 0},
          "id": 2,
          "targets": [{"expr": "sum(vllm:num_requests_waiting{model_name=~\"$model\"})", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 4}, {"color": "red", "value": 16}]}, "unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "KV cache",
          "gridPos": {"h": 4, "w": 3, "x": 6, "y": 0},
          "id": 3,
          "targets": [{"expr": "max(vllm:gpu_cache_usage_perc{model_name=~\"$model\"}) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 75}, {"color": "red", "value": 90}]}, "unit": "percent", "max": 100, "min": 0}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Success rate",
          "gridPos": {"h": 4, "w": 3, "x": 9, "y": 0},
          "id": 4,
          "targets": [{"expr": "sum(rate(vllm:request_success_total{model_name=~\"$model\"}[5m])) / clamp_min(sum(rate(vllm:e2e_request_latency_seconds_count{model_name=~\"$model\"}[5m])), 0.0001)", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.99}, {"color": "green", "value": 0.999}]}, "unit": "percentunit", "max": 1, "min": 0, "decimals": 3}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Gen tokens/s",
          "gridPos": {"h": 4, "w": 3, "x": 12, "y": 0},
          "id": 5,
          "targets": [{"expr": "sum(rate(vllm:generation_tokens_total{model_name=~\"$model\"}[1m]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "p95 TTFT",
          "gridPos": {"h": 4, "w": 3, "x": 15, "y": 0},
          "id": 6,
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(vllm:time_to_first_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 2}]}, "unit": "s"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "p95 e2e",
          "gridPos": {"h": 4, "w": 3, "x": 18, "y": 0},
          "id": 7,
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "refId": "A"}],
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 5}, {"color": "red", "value": 15}]}, "unit": "s"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Pod restarts",
          "gridPos": {"h": 4, "w": 3, "x": 21, "y": 0},
          "id": 8,
          "targets": [{"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"llama\"}[1h]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value"}
        },
        {
          "type": "timeseries",
          "title": "Time to first token",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 9,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:time_to_first_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A", "exemplar": true},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:time_to_first_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B", "exemplar": true},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:time_to_first_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C", "exemplar": true}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "End-to-end latency",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 10,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A", "exemplar": true},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B", "exemplar": true},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:e2e_request_latency_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C", "exemplar": true}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Inter-token latency",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 11,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:time_per_output_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A", "exemplar": true},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:time_per_output_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B", "exemplar": true},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:time_per_output_token_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C", "exemplar": true}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Token throughput",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 12,
          "targets": [
            {"expr": "sum(rate(vllm:prompt_tokens_total{model_name=~\"$model\"}[1m]))", "legendFormat": "prompt/s", "refId": "A"},
            {"expr": "sum(rate(vllm:generation_tokens_total{model_name=~\"$model\"}[1m]))", "legendFormat": "generation/s", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 20, "stacking": {"mode": "normal"}}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Request queue depth",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "id": 13,
          "targets": [
            {"expr": "sum(vllm:num_requests_running{model_name=~\"$model\"})", "legendFormat": "running", "refId": "A"},
            {"expr": "sum(vllm:num_requests_waiting{model_name=~\"$model\"})", "legendFormat": "waiting", "refId": "B"},
            {"expr": "sum(vllm:num_requests_swapped{model_name=~\"$model\"})", "legendFormat": "swapped", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "KV cache & preemptions",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "id": 14,
          "targets": [
            {"expr": "max(vllm:gpu_cache_usage_perc{model_name=~\"$model\"}) * 100", "legendFormat": "gpu cache %", "refId": "A"},
            {"expr": "sum(rate(vllm:num_preemptions_total{model_name=~\"$model\"}[5m]))", "legendFormat": "preemptions/s", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}, "overrides": [{"matcher": {"id": "byName", "options": "gpu cache %"}, "properties": [{"id": "unit", "value": "percent"}, {"id": "max", "value": 100}]}]},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Prompt token length",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "id": 15,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:request_prompt_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:request_prompt_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:request_prompt_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Generation token length",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "id": 16,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:request_generation_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:request_generation_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:request_generation_tokens_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Error rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 36},
          "id": 17,
          "targets": [
            {"expr": "(sum(rate(vllm:e2e_request_latency_seconds_count{model_name=~\"$model\"}[5m])) - sum(rate(vllm:request_success_total{model_name=~\"$model\"}[5m]))) / clamp_min(sum(rate(vllm:e2e_request_latency_seconds_count{model_name=~\"$model\"}[5m])), 0.0001)", "legendFormat": "error rate", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 20}, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 0.001}, {"color": "red", "value": 0.01}]}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Successful vs failed requests",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 36},
          "id": 18,
          "targets": [
            {"expr": "sum(rate(vllm:request_success_total{model_name=~\"$model\"}[1m]))", "legendFormat": "success/s", "refId": "A"},
            {"expr": "sum(rate(vllm:e2e_request_latency_seconds_count{model_name=~\"$model\"}[1m])) - sum(rate(vllm:request_success_total{model_name=~\"$model\"}[1m]))", "legendFormat": "failure/s", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "reqps", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 20, "stacking": {"mode": "normal"}}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Container CPU",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 44},
          "id": 19,
          "targets": [{"expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"llama\", container=\"vllm\"}[1m]))", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Container memory",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 44},
          "id": 20,
          "targets": [{"expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"llama\", container=\"vllm\"})", "legendFormat": "{{pod}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Prefix cache hit rate",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 52},
          "id": 22,
          "targets": [
            {"expr": "sum(rate(vllm:gpu_prefix_cache_hits_total{model_name=~\"$model\"}[5m])) / clamp_min(sum(rate(vllm:gpu_prefix_cache_queries_total{model_name=~\"$model\"}[5m])), 0.0001)", "legendFormat": "hit rate", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 0.3}, {"color": "green", "value": 0.6}]}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "KV cache usage (GPU vs CPU)",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 52},
          "id": 23,
          "targets": [
            {"expr": "max(vllm:gpu_cache_usage_perc{model_name=~\"$model\"}) * 100", "legendFormat": "GPU %", "refId": "A"},
            {"expr": "max(vllm:cpu_cache_usage_perc{model_name=~\"$model\"}) * 100", "legendFormat": "CPU %", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Preemptions",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 60},
          "id": 24,
          "targets": [
            {"expr": "sum(rate(vllm:num_preemptions_total{model_name=~\"$model\"}[5m]))", "legendFormat": "preemptions/s", "refId": "A"},
            {"expr": "sum(increase(vllm:num_preemptions_total{model_name=~\"$model\"}[1h]))", "legendFormat": "1h total", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}, "overrides": [{"matcher": {"id": "byName", "options": "1h total"}, "properties": [{"id": "custom.axisPlacement", "value": "right"}]}]},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Tokens per iteration",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 60},
          "id": 25,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:iteration_tokens_total_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:iteration_tokens_total_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:iteration_tokens_total_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Queue time",
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 68},
          "id": 26,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:request_queue_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:request_queue_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:request_queue_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Prefill time",
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 68},
          "id": 27,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:request_prefill_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum(rate(vllm:request_prefill_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum(rate(vllm:request_prefill_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Decode time",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 68},
          "id": 28,
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(vllm:request_decode_time_seconds_bucket{model_name=~\"$model\"}[5m])) by (le))", "legendFormat": "p50", "refId": "A"},
