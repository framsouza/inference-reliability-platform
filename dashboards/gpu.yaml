apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-gpu
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "stat",
          "title": "GPU count",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "count(DCGM_FI_DEV_GPU_UTIL)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value"}
        },
        {
          "type": "stat",
          "title": "SM util (max)",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "id": 2,
          "targets": [{"expr": "max(DCGM_FI_DEV_GPU_UTIL)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 80}, {"color": "red", "value": 95}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "GPU mem used",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "id": 3,
          "targets": [{"expr": "max(DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE)) * 100", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 85}, {"color": "red", "value": 95}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Temp (max)",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "id": 4,
          "targets": [{"expr": "max(DCGM_FI_DEV_GPU_TEMP)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "celsius", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 80}, {"color": "red", "value": 85}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "Power (max)",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "id": 5,
          "targets": [{"expr": "max(DCGM_FI_DEV_POWER_USAGE)", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "watt"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value", "graphMode": "area"}
        },
        {
          "type": "stat",
          "title": "XID errors (24h)",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "id": 6,
          "targets": [{"expr": "sum(increase(DCGM_FI_DEV_XID_ERRORS[24h]))", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "textMode": "auto", "colorMode": "value"}
        },
        {
          "type": "timeseries",
          "title": "SM utilization",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "id": 7,
          "targets": [{"expr": "DCGM_FI_DEV_GPU_UTIL", "legendFormat": "gpu {{gpu}} @ {{Hostname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Memory copy utilization",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "id": 8,
          "targets": [{"expr": "DCGM_FI_DEV_MEM_COPY_UTIL", "legendFormat": "gpu {{gpu}} @ {{Hostname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100, "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Framebuffer memory",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 9,
          "targets": [
            {"expr": "DCGM_FI_DEV_FB_USED * 1024 * 1024", "legendFormat": "used gpu {{gpu}}", "refId": "A"},
            {"expr": "(DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) * 1024 * 1024", "legendFormat": "total gpu {{gpu}}", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Power draw",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 10,
          "targets": [{"expr": "DCGM_FI_DEV_POWER_USAGE", "legendFormat": "gpu {{gpu}} @ {{Hostname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "watt", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Temperature",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "id": 11,
          "targets": [{"expr": "DCGM_FI_DEV_GPU_TEMP", "legendFormat": "gpu {{gpu}} @ {{Hostname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "celsius", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "Clock speeds",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "id": 12,
          "targets": [
            {"expr": "DCGM_FI_DEV_SM_CLOCK", "legendFormat": "SM gpu {{gpu}}", "refId": "A"},
            {"expr": "DCGM_FI_DEV_MEM_CLOCK", "legendFormat": "mem gpu {{gpu}}", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "rothz", "custom": {"drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "XID errors",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 28},
          "id": 13,
          "targets": [{"expr": "increase(DCGM_FI_DEV_XID_ERRORS[5m])", "legendFormat": "gpu {{gpu}} @ {{Hostname}}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "bars", "fillOpacity": 100}, "color": {"mode": "fixed", "fixedColor": "red"}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["sum"]}, "tooltip": {"mode": "multi"}}
        },
        {
          "type": "timeseries",
          "title": "ECC errors",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 28},
          "id": 14,
          "targets": [
            {"expr": "increase(DCGM_FI_DEV_ECC_SBE_VOL_TOTAL[5m])", "legendFormat": "SBE gpu {{gpu}}", "refId": "A"},
            {"expr": "increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[5m])", "legendFormat": "DBE gpu {{gpu}}", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"drawStyle": "bars", "fillOpacity": 100}}},
          "options": {"legend": {"showLegend": true, "displayMode": "table", "placement": "bottom", "calcs": ["sum"]}, "tooltip": {"mode": "multi"}}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["gpu", "dcgm", "nvidia"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "NVIDIA GPU (DCGM)",
      "uid": "nvidia-gpu-dcgm",
      "version": 1
    }
