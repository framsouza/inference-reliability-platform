apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-inference-pod-priorityclass
  annotations:
    policies.kyverno.io/title: "Pods in llama ns must set priorityClassName"
    policies.kyverno.io/category: Inference
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Any pod in the llama namespace must set priorityClassName (typically
      `gpu-inference`) so it can't be evicted before random cronjobs or
      debug pods under node memory pressure.
spec:
  admission: true
  background: true
  validationFailureAction: Audit
  failurePolicy: Ignore
  rules:
    - name: require-priorityclass
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [llama]
      validate:
        message: >-
          Pod "{{ request.object.metadata.name }}" in llama namespace has no
          priorityClassName. Set it to `gpu-inference` to prevent eviction
          before best-effort workloads.
        pattern:
          spec:
            priorityClassName: "?*"
