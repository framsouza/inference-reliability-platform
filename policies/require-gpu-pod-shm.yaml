apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-gpu-pod-shm
  annotations:
    policies.kyverno.io/title: "GPU pods must mount an in-memory /dev/shm"
    policies.kyverno.io/category: GPU
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      GPU workloads (PyTorch, vLLM, etc.) crash with `Bus error` when /dev/shm
      stays at the kubelet default (64 MiB). Any pod requesting nvidia.com/gpu
      must have an in-memory emptyDir volume; the standard convention is to
      name it `shm` and mount it at /dev/shm.
spec:
  admission: true
  background: true
  validationFailureAction: Audit
  failurePolicy: Ignore
  rules:
    - name: require-shm-emptydir
      match:
        any:
          - resources:
              kinds: [Pod]
      preconditions:
        all:
          - key: "{{ length(request.object.spec.containers[?resources.limits.\"nvidia.com/gpu\"]) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: >-
          Pod "{{ request.object.metadata.name }}" requests nvidia.com/gpu but
          has no in-memory emptyDir volume (medium: Memory) for /dev/shm. Add
          `{name: shm, emptyDir: {medium: Memory, sizeLimit: 2Gi}}` and mount
          it at /dev/shm — PyTorch/vLLM crash with "Bus error" under load
          without it.
        deny:
          conditions:
            all:
              - key: "{{ length(request.object.spec.volumes[?emptyDir.medium == 'Memory']) }}"
                operator: LessThan
                value: 1
